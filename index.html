<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GOPU OS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GOPU OS" />
    <meta name="description" content="GOPU Export Command — AI-powered export intelligence platform" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>GOPU OS | Export Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="print-header" aria-hidden="true">
      <div class="print-header-brand">
        <strong>GOPU OS</strong>
        <span>Export Command Platform</span>
      </div>
      <div class="print-header-meta">
        <span id="print-timestamp"></span>
        <span>Confidential - Executive Use Only</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('beforeprint', function() {
        var el = document.getElementById('print-timestamp');
        if (el) el.textContent = 'Printed: ' + new Date().toLocaleString();
      });
    </script>
  </body>
</html>
